services:
  - type: web
    name: nakul-api
    runtime: docker
    branch: codex/monogram-ui
    plan: starter
    region: singapore
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 60
    autoDeployTrigger: commit
    envVars:
      - key: NAKUL_REQUIRE_AUTH
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: NAKUL_ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: DATA_GOV_IN_API_KEY
        sync: false
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image
