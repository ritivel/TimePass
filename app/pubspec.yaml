name: nakul_app
description: "Nakul — dynamic visual answers for Indian daily life."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  audioplayers: ^6.8.1
  cloudflare_turnstile: 3.7.2
  cross_file: ^0.3.5+4
  cupertino_icons: ^1.0.9
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.11
  flutter_inappwebview: 6.1.5
  genui: ^0.9.2
  http: ^1.6.0
  json_schema_builder: ^0.1.5
  path_provider: ^2.1.6
  record: ^7.1.1
  shared_preferences: ^2.5.5
  supabase_flutter: 2.16.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Keep this plugin family on its mutually compatible stable set. The newer
# Android-only prerelease pulls a platform interface that 6.1.5 cannot use.
dependency_overrides:
  flutter_inappwebview_android: 1.1.3
  flutter_inappwebview_platform_interface: 1.3.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/art/
