# Nakul component catalog — SOURCE OF TRUTH (M0 subset)
# Full contract with wireframes and rationale: COMPONENT_CATALOG.md
# Regenerate artifacts after editing:  uv run catalog/generator/generate.py
#
# Prop spec keys:
#   type:      string | number | integer | boolean | object | array | children | childId | action
#   required:  bool (default false)
#   dynamic:   bool (default true for string/number/integer/boolean) — literal OR {path} binding
#   enum:      allowed values (string props)
#   fields:    nested prop map (object / array-item shape)
#   items:     item spec for arrays (type or {fields})
#   minItems / maxItems, default, description

catalogId: "https://nakul.app/catalogs/core/v1"
protocol: "v0.9.1"

# Model-facing composition rules — compiled verbatim into the system prompt.
# Keep under ~600 tokens (COMPONENT_CATALOG.md §9).
instructions: |
  Compose a visual answer mini-app, not a chat transcript. Rules:
  1. Root is one Column with id "root". Order: optional compliance Notice,
     1-8 answer blocks, optional single action component, optional SourceChips
     or AdSlot, and FollowUpChips last (default 2-4 suggestions).
  2. Pick a layout by intent: status/current data -> one hero plus next action;
     compare/choose -> ComparisonTable plus a short recommendation; numeric
     trend/breakdown -> ChartCard; schedule/plan/trip -> TimelineCard; recipe ->
     RecipeCard; how-to, packing, prep -> Checklist plus compact notes; simple
     prose/draft -> Markdown only when a visual structure would be worse.
  3. Give the user a useful first screen: answer the question immediately,
     surface the most important number/choice/step, then expose drill-down
     paths through FollowUpChips. Avoid long walls of Markdown.
  4. Only Row, Column, Card, List have children; Card and Button take one child.
     All other components are leaves. Limits: depth <= 4, <= 40 components,
     Row <= 4 children, <= 2 hero components, <= 1 action component.
  5. Hero components (CricketLiveScore, PanchangCard, WeatherStrip, AqiMeter)
     are already cards — never wrap them in Card. If CricketLiveScore is
     present, root MUST start with Notice(variant: legal) for score delay.
  6. Bind hero data with {"path": "/..."} references into server dataModel.
     Do not copy those values into props.
  7. Every visible string must be in the requested output language. Use Latin
     digits. Never invent URLs; only use server-provided link fields.
  8. Be compact: aim for 3-6 components plus FollowUpChips. Prefer one strong
     structured surface over many weak sections.
  9. Use at most one GeneratedVisual when imagery materially helps: recipes,
     places, products, stories, culture, style inspiration, or explaining a
     physical concept. Its prompt describes only the subject and composition;
     request no text, letters, logos, UI, charts, maps, or factual labels. Do
     not use GeneratedVisual as evidence for live facts or exact comparisons.

components:

  # ── Layer 0: primitives (adopted from Basic Catalog, narrowed) ──────────

  Text:
    layer: primitive
    m0: true
    adopted: true
    description: Single-style text run. h1 is reserved for the surface title.
    props:
      text: {type: string, required: true, description: Text content.}
      variant: {type: string, enum: [h1, h2, h3, body, caption, label], default: body}

  Markdown:
    layer: primitive
    m0: true
    # Not in genui's Basic Catalog (its Text renders markdown) — we ship our own.
    adopted: false
    description: >
      Prose answers (letters, explanations, drafts). GFM subset: bold, italic,
      lists, tables, links. No raw HTML, no images.
    props:
      text: {type: string, required: true, description: Markdown source.}

  Image:
    layer: primitive
    m0: true
    adopted: true
    description: Remote image. https URLs from server-provided fields only.
    props:
      url: {type: string, required: true}
      alt: {type: string}
      variant: {type: string, enum: [avatar, thumbnail, feature, hero], default: thumbnail}
      fit: {type: string, enum: [cover, contain], default: cover}

  Icon:
    layer: primitive
    m0: true
    adopted: true
    description: Named icon from the app icon set.
    props:
      name:
        type: string
        required: true
        enum: [sun, moon, cloud, rain, storm, wind, humidity, temperature,
               cricket, train, calendar, clock, warning, info, check, star,
               location, chevronRight, refresh, sparkle]
      size: {type: string, enum: [sm, md, lg], default: md}

  Row:
    layer: primitive
    m0: true
    adopted: true
    container: children
    description: Horizontal layout. Max 4 children.
    props:
      children: {type: children, required: true, maxItems: 4}
      justify: {type: string, enum: [start, center, end, spaceBetween], default: start}
      align: {type: string, enum: [start, center, end], default: center}
      gap: {type: string, enum: [none, sm, md, lg], default: sm}
      wrap: {type: boolean, default: false}

  Column:
    layer: primitive
    m0: true
    adopted: true
    container: children
    description: Vertical layout. The surface root is a Column with id "root".
    props:
      children: {type: children, required: true}
      justify: {type: string, enum: [start, center, end, spaceBetween], default: start}
      align: {type: string, enum: [start, center, end, stretch], default: stretch}
      gap: {type: string, enum: [none, sm, md, lg], default: md}

  Card:
    layer: primitive
    m0: true
    adopted: true
    container: child
    description: Grouping container; tappable when action is set. Never wrap hero components.
    props:
      child: {type: childId, required: true}
      variant: {type: string, enum: [elevated, outlined, filled], default: outlined}
      action: {type: action}

  List:
    layer: primitive
    m0: true
    adopted: true
    container: children
    description: Scrollable list of children; horizontal = generic rail.
    props:
      children: {type: children, required: true}
      direction: {type: string, enum: [vertical, horizontal], default: vertical}

  Button:
    layer: primitive
    m0: true
    adopted: true
    container: child
    description: Generic action trigger.
    props:
      child: {type: childId, required: true}
      action: {type: action, required: true}
      variant: {type: string, enum: [primary, secondary, text, destructive], default: primary}
      enabled: {type: boolean, default: true}

  Divider:
    layer: primitive
    m0: true
    adopted: true
    description: Visual separator.
    props: {}

  # ── Layer 1: generic answer components (M0 subset) ──────────────────────

  KeyValueGrid:
    layer: generic
    m0: true
    description: Labeled facts in a 1-2 column grid. The generic-tier workhorse.
    props:
      title: {type: string}
      columns: {type: integer, enum: [1, 2], default: 2}
      items:
        type: array
        required: true
        minItems: 1
        maxItems: 12
        items:
          fields:
            label: {type: string, required: true}
            value: {type: string, required: true}
            icon: {type: string}
            emphasis: {type: boolean, default: false}

  Notice:
    layer: generic
    m0: true
    description: >
      Callout for info/warnings and mandatory compliance disclosures
      (cricket lag, astrology disclaimer).
    props:
      text: {type: string, required: true}
      variant: {type: string, required: true, enum: [info, warning, legal, success]}
      icon: {type: string}
      dense: {type: boolean, default: false}

  FollowUpChips:
    layer: generic
    m0: true
    description: >
      Suggested next queries; always the last child of the root Column.
      Tapping a chip sends its query as a new user message.
    props:
      suggestions:
        type: array
        required: true
        minItems: 2
        maxItems: 4
        items:
          fields:
            label: {type: string, required: true, description: Short chip text in output language.}
            query: {type: string, required: true, description: Full query to run when tapped.}
    events:
      follow_up_selected: {query: string}

  ComparisonTable:
    layer: generic
    m0: false
    description: >
      N-way comparison (e.g. mutual funds vs FD). Use this instead of
      KeyValueGrid whenever comparing 2+ options across criteria.
    props:
      title: {type: string}
      columns:
        type: array
        required: true
        minItems: 2
        maxItems: 4
        items:
          fields:
            key: {type: string, required: true, dynamic: false}
            label: {type: string, required: true}
      rows:
        type: array
        required: true
        minItems: 1
        maxItems: 10
        items:
          fields:
            label: {type: string, required: true, description: Criterion name (e.g. "Risk").}
            cells: {type: array, required: true, items: {type: string}, description: One cell per column, same order as columns.}
      highlightColumnKey: {type: string, dynamic: false, description: Key of the recommended column, if any.}
      footnote: {type: string}

  Checklist:
    layer: generic
    m0: false
    description: >
      Diagnostic / to-do / packing list with optional check-off. Use for
      step-by-step remedies and preparation lists.
    props:
      title: {type: string}
      items:
        type: array
        required: true
        minItems: 1
        # 24, not 12: real content (weekly meal plans, packing lists) runs long
        maxItems: 24
        items:
          fields:
            id: {type: string, required: true, dynamic: false}
            text: {type: string, required: true}
            detail: {type: string}
            checked: {type: boolean, default: false}
      interactive: {type: boolean, default: false, description: Whether the user can toggle items.}
    events:
      checklist_toggled: {itemId: string, checked: boolean}

  SourceChips:
    layer: generic
    m0: false
    description: >
      Attribution chips for web sources that informed the answer. The SERVER
      appends this from search-grounding metadata — the model must never
      fabricate one.
    props:
      sources:
        type: array
        required: true
        minItems: 1
        maxItems: 5
        items:
          fields:
            title: {type: string, required: true}
            domain: {type: string, required: true}
            url: {type: string, required: true}
    events:
      source_opened: {url: string}

  GeneratedVisual:
    layer: generic
    m0: false
    description: >
      One model-generated editorial visual that makes an answer easier or more
      delightful to understand. The server applies Nakul's fixed soft-3D art
      direction and safety rules; the model supplies subject/composition only.
      Never use for factual charts, maps, text-bearing graphics, or live proof.
    props:
      prompt:
        type: string
        required: true
        minLength: 8
        maxLength: 500
        description: Concrete visual subject and composition. No text, logos, UI, charts, or URLs.
      alt: {type: string, required: true, minLength: 3, maxLength: 180, description: Accessible description in the output language.}
      title: {type: string, maxLength: 90}
      caption: {type: string, maxLength: 180}
      aspectRatio: {type: string, enum: [landscape, square, portrait], default: landscape}

  ChartCard:
    layer: generic
    m0: false
    description: >
      Compact bar, line, or donut chart for numeric patterns. Use only when the
      supplied numbers are meaningful; include displayValue for readable labels.
    props:
      title: {type: string, required: true}
      subtitle: {type: string}
      type: {type: string, required: true, enum: [bar, line, donut]}
      series:
        type: array
        required: true
        minItems: 2
        maxItems: 8
        items:
          fields:
            label: {type: string, required: true}
            value: {type: number, required: true}
            displayValue: {type: string, required: true}
            tone: {type: string, enum: [ink, green, amber, red, blue], default: ink}
      footnote: {type: string}

  TimelineCard:
    layer: generic
    m0: false
    description: >
      Ordered schedule, itinerary, process, or journey. Use timeLabel for times,
      days, or sequence markers and keep each item actionable and compact.
    props:
      title: {type: string, required: true}
      subtitle: {type: string}
      items:
        type: array
        required: true
        minItems: 2
        maxItems: 12
        items:
          fields:
            timeLabel: {type: string, required: true}
            title: {type: string, required: true}
            detail: {type: string}
            status: {type: string, enum: [upcoming, active, done, warning], default: upcoming}
      footnote: {type: string}

  RecipeCard:
    layer: generic
    m0: false
    description: >
      Interactive recipe overview with ingredients and tappable step cards.
      Pair with one GeneratedVisual when a finished-dish visual adds value.
    props:
      title: {type: string, required: true}
      summary: {type: string}
      servingsText: {type: string}
      totalTimeText: {type: string}
      ingredients:
        type: array
        required: true
        minItems: 2
        maxItems: 16
        items:
          fields:
            name: {type: string, required: true}
            amount: {type: string, required: true}
      steps:
        type: array
        required: true
        minItems: 2
        maxItems: 12
        items:
          fields:
            title: {type: string, required: true}
            detail: {type: string, required: true}
            durationText: {type: string}
      tips: {type: array, maxItems: 4, items: {type: string}}
    events:
      recipe_step_selected: {stepIndex: integer}

  # ── Layer 2: hero components (M0 subset) ────────────────────────────────

  CricketLiveScore:
    layer: hero
    m0: true
    description: >
      Live match card. Data arrives via the surface data model (adapter-fed,
      auto-refreshing); props are normally {path} bindings. Requires a legal
      Notice on the surface disclosing lagSeconds.
    props:
      matchId: {type: string, required: true, dynamic: false}
      matchTitle: {type: string, required: true, description: e.g. "IND vs AUS · 3rd T20I"}
      statusText: {type: string, required: true, description: Localized state line, e.g. "IND need 43 off 30".}
      teams:
        type: array
        required: true
        minItems: 2
        maxItems: 2
        items:
          fields:
            name: {type: string, required: true}
            shortName: {type: string, required: true}
            logoUrl: {type: string}
            scoreText: {type: string, description: e.g. "186/4"}
            oversText: {type: string, description: e.g. "17.2"}
      batters:
        type: array
        maxItems: 2
        items:
          fields:
            name: {type: string, required: true}
            runsText: {type: string, required: true, description: e.g. "52*"}
            ballsText: {type: string}
            onStrike: {type: boolean, default: false}
      bowler:
        type: object
        fields:
          name: {type: string, required: true}
          figuresText: {type: string, description: e.g. "2/34"}
          oversText: {type: string}
      recentBalls:
        type: array
        maxItems: 6
        items: {type: string}
      lagSeconds: {type: number, required: true, description: Configured display lag; drives the legal Notice.}
      updatedAtText: {type: string, required: true}

  PanchangCard:
    layer: hero
    m0: true
    description: >
      Daily panchang for a location. All times pre-formatted and localized by
      the adapter (cacheable per city+date).
    props:
      dateText: {type: string, required: true, description: Localized date incl. lunar calendar.}
      locationName: {type: string, required: true}
      tithi:
        type: object
        required: true
        fields:
          name: {type: string, required: true}
          endsAtText: {type: string}
      nakshatra:
        type: object
        required: true
        fields:
          name: {type: string, required: true}
          endsAtText: {type: string}
      yoga:
        type: object
        fields:
          name: {type: string, required: true}
          endsAtText: {type: string}
      karana:
        type: object
        fields:
          name: {type: string, required: true}
          endsAtText: {type: string}
      sunriseText: {type: string, required: true}
      sunsetText: {type: string, required: true}
      rahuKalam:
        type: object
        required: true
        fields:
          startText: {type: string, required: true}
          endText: {type: string, required: true}
      festivals:
        type: array
        maxItems: 3
        items: {type: string}
      variant: {type: string, enum: [compact, full], default: full}

  WeatherStrip:
    layer: hero
    m0: true
    description: Current conditions + multi-day forecast for one location.
    props:
      locationName: {type: string, required: true}
      current:
        type: object
        required: true
        fields:
          tempText: {type: string, required: true}
          condition:
            type: string
            required: true
            enum: [clear, partlyCloudy, cloudy, mist, haze, rain, heavyRain, thunderstorm, snow]
          conditionText: {type: string, required: true, description: Localized condition line.}
          feelsLikeText: {type: string}
          humidityText: {type: string}
          windText: {type: string}
      days:
        type: array
        required: true
        minItems: 3
        maxItems: 7
        items:
          fields:
            dayLabel: {type: string, required: true}
            minText: {type: string, required: true}
            maxText: {type: string, required: true}
            condition:
              type: string
              required: true
              enum: [clear, partlyCloudy, cloudy, mist, haze, rain, heavyRain, thunderstorm, snow]
            rainPctText: {type: string}
      alerts:
        type: array
        maxItems: 3
        items:
          fields:
            severity: {type: string, required: true, enum: [watch, warning]}
            text: {type: string, required: true}

  AqiMeter:
    layer: hero
    m0: true
    description: AQI gauge (CPCB scale) with health advice.
    props:
      locationName: {type: string, required: true}
      aqi: {type: number, required: true}
      category:
        type: string
        required: true
        enum: [good, satisfactory, moderate, poor, veryPoor, severe]
        description: CPCB category; drives the color band.
      categoryText: {type: string, required: true, description: Localized category label.}
      dominantPollutant: {type: string}
      stationName: {type: string}
      updatedAtText: {type: string, required: true}
      healthAdviceText: {type: string, required: true}

# Post-M0 components reserved by COMPONENT_CATALOG.md §4 (names are frozen;
# adding one = define here + implement CatalogItem + design pass):
reserved:
  - MediaCarousel
  # (SourceChips promoted 2026-07-08 — server-appended from grounding metadata)
  - MapCard
  - CricketMatchSummary
  - TrainStatusTimeline
  - PnrStatusCard
  - MuhuratList
  - HoroscopeCard
  - PriceTicker
  - UpiPayButton
  - AffiliateCta
  - ConsultReferralCard
  - DeepLinkCard
  - AdSlot
